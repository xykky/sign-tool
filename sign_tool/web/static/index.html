<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card h2 {
            font-size: 16px;
            color: #555;
            margin-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 8px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        input, select {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: #4a90d9;
        }
        input[type="time"] { width: 120px; }
        input[type="text"], input[type="tel"], input[type="password"] { flex: 1; min-width: 120px; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #357abd; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn-success:hover { background: #45a817; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-danger:hover { background: #e8383a; }
        .btn-warning { background: #faad14; color: #fff; }
        .btn-warning:hover { background: #d9a012; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-outline {
            background: transparent;
            border: 1px solid #d9d9d9;
            color: #666;
        }
        .btn-outline:hover { border-color: #4a90d9; color: #4a90d9; }

        /* 消息提示 */
        .msg {
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 14px;
            display: none;
        }
        .msg.ok { display: block; background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .msg.err { display: block; background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }

        /* 账号列表 */
        .account-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .account-item:last-child { border-bottom: none; }
        .account-info { flex: 1; }
        .account-platform {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 8px;
        }
        .platform-kuro { background: #e6f7ff; color: #1890ff; }
        .platform-tajiduo { background: #fff7e6; color: #fa8c16; }
        .account-uid { font-weight: 500; }
        .account-detail { font-size: 12px; color: #999; }

        /* 签到状态 */
        .status-group {
            margin-bottom: 12px;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        .status-group-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #333;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
        }
        .status-kind { color: #666; }
        .status-icon { font-size: 16px; }
        .status-ok { color: #52c41a; }
        .status-skip { color: #999; }
        .status-fail { color: #ff4d4f; }
        .status-progress { color: #1890ff; }

        /* 签到进度 */
        .sign-log {
            background: #1a1a1a;
            color: #0f0;
            font-family: "Cascadia Code", "Fira Code", monospace;
            font-size: 13px;
            padding: 12px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
            margin-top: 12px;
        }
        .sign-log.show { display: block; }
        .sign-log .log-error { color: #ff4d4f; }
        .sign-log .log-skip { color: #999; }
        .sign-log .log-progress { color: #1890ff; }
        .sign-log .log-done { color: #52c41a; }

        /* 定时配置 */
        .schedule-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .schedule-status .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.on { background: #52c41a; }
        .status-dot.off { background: #d9d9d9; }
        .schedule-status .status-text {
            font-size: 14px;
            color: #333;
        }
        .schedule-status .status-detail {
            font-size: 12px;
            color: #999;
        }
        .schedule-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 空状态 */
        .empty {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        /* 用户信息栏 */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4a90d9;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }
        .user-name {
            font-weight: 500;
            font-size: 14px;
        }
        .user-role {
            font-size: 12px;
            color: #999;
        }
        .admin-badge {
            display: inline-block;
            padding: 2px 6px;
            background: #faad14;
            color: #fff;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 4px;
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: #fff;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .tab:hover { background: #f5f5f5; }
        .tab.active { background: #4a90d9; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 用户管理表格 */
        .user-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .user-table th, .user-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .user-table th {
            background: #fafafa;
            font-weight: 500;
            color: #666;
        }
        .user-table tr:hover { background: #fafafa; }

        /* 响应式 */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .form-row { flex-direction: column; }
            .form-row input, .form-row select, .form-row button { width: 100%; }
            .tabs { flex-wrap: wrap; }
            .tab { flex: none; width: calc(50% - 4px); }
        }
    </style>
</head>
<body>
    <h1>签到工具</h1>

    <!-- 未登录：登录/注册界面 -->
    <div id="auth-section">
        <div class="card">
            <h2 id="auth-title">登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="auth-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="auth-password" placeholder="请输入密码">
            </div>
            <div class="form-row">
                <button class="btn-primary" onclick="doAuth()" id="btn-auth">登录</button>
                <button class="btn-outline" onclick="toggleAuthMode()" id="btn-toggle-auth">没有账号？注册</button>
            </div>
            <div id="auth-msg" class="msg"></div>
        </div>
    </div>

    <!-- 已登录：主界面 -->
    <div id="main-section" style="display:none">
        <!-- 用户信息栏 -->
        <div class="user-bar">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">U</div>
                <div>
                    <div class="user-name">
                        <span id="display-username">用户</span>
                        <span id="admin-badge" class="admin-badge" style="display:none">管理员</span>
                    </div>
                    <div class="user-role" id="display-role">普通用户</div>
                </div>
            </div>
            <button class="btn-outline btn-sm" onclick="doLogout()">退出</button>
        </div>

        <!-- 管理员标签页 -->
        <div id="admin-tabs" class="tabs" style="display:none">
            <div class="tab active" onclick="switchTab('user')">我的</div>
            <div class="tab" onclick="switchTab('admin')">管理</div>
        </div>

        <!-- 用户功能 -->
        <div id="user-content" class="tab-content active">
            <!-- 添加账号 -->
            <div class="card">
                <h2>添加账号</h2>
                <div class="form-row">
                    <select id="add-platform" onchange="onAddPlatformChange()">
                        <option value="kuro">库洛 (鸣潮/战双)</option>
                        <option value="tajiduo">塔吉多 (异环/幻塔)</option>
                    </select>
                    <select id="add-game">
                        <option value="waves">鸣潮</option>
                        <option value="pgr">战双</option>
                    </select>
                </div>
                <div class="form-row">
                    <input id="add-phone" type="tel" placeholder="手机号" maxlength="11">
                    <input id="add-code" type="text" placeholder="验证码" maxlength="6">
                </div>
                <div class="form-row">
                    <button class="btn-outline" onclick="sendAddCode()" id="btn-send-add-code">发送验证码</button>
                    <button class="btn-primary" onclick="doAddLogin()" id="btn-add-login">登录并添加</button>
                </div>
                <div id="add-msg" class="msg"></div>
            </div>

            <!-- 我的账号 -->
            <div class="card">
                <h2>我的账号</h2>
                <div id="my-account-list">
                    <div class="empty">加载中...</div>
                </div>
            </div>

            <!-- 我的签到状态 -->
            <div class="card">
                <h2>今日签到状态</h2>
                <div id="my-status-list">
                    <div class="empty">加载中...</div>
                </div>
            </div>

            <!-- 执行签到 -->
            <div class="card">
                <h2>执行签到</h2>
                <div class="form-row">
                    <button class="btn-success" onclick="doMySign()" id="btn-my-sign">开始签到</button>
                </div>
                <div id="my-sign-log" class="sign-log"></div>
            </div>

            <!-- 我的定时签到 -->
            <div class="card">
                <h2>我的定时签到</h2>
                <div id="my-schedule-status" class="schedule-status">
                    <span class="status-dot off"></span>
                    <div>
                        <div class="status-text">加载中...</div>
                        <div class="status-detail">定时签到设置</div>
                    </div>
                </div>
                <div class="schedule-actions">
                    <input type="time" id="my-sched-time" value="06:00" onchange="saveMySchedule()">
                    <button class="btn-warning" onclick="toggleMySchedule()" id="btn-toggle-my-sched">启用定时</button>
                </div>
                <div id="my-schedule-msg" class="msg"></div>
            </div>

            <!-- 我的推送配置 -->
            <div class="card">
                <h2>推送通知</h2>
                <div id="my-notify-status" class="schedule-status">
                    <span class="status-dot off"></span>
                    <div>
                        <div class="status-text">加载中...</div>
                        <div class="status-detail">签到完成后推送结果</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Server酱 SCKEY</label>
                    <input type="text" id="my-notify-sckey" placeholder="SCT0123456789abcdef...">
                </div>
                <div class="form-group">
                    <label>Telegram Bot Token</label>
                    <input type="text" id="my-notify-tg-token" placeholder="123456789:ABCdefGHIjklMNOpqrsTUVwxyz...">
                </div>
                <div class="form-group">
                    <label>Telegram Chat ID</label>
                    <input type="text" id="my-notify-tg-chat" placeholder="123456789">
                </div>
                <div class="form-row">
                    <button class="btn-primary" onclick="saveMyNotify()">保存配置</button>
                    <button class="btn-outline" onclick="toggleMyNotify()" id="btn-toggle-my-notify">启用推送</button>
                    <button class="btn-outline" onclick="testMyNotify()">测试推送</button>
                </div>
                <div id="my-notify-msg" class="msg"></div>
            </div>
        </div>

        <!-- 管理员功能 -->
        <div id="admin-content" class="tab-content">
            <!-- 用户管理 -->
            <div class="card">
                <h2>用户管理</h2>
                <div id="admin-user-list">
                    <div class="empty">加载中...</div>
                </div>
            </div>

            <!-- 全部账号 -->
            <div class="card">
                <h2>全部账号</h2>
                <div id="admin-account-list">
                    <div class="empty">加载中...</div>
                </div>
            </div>

            <!-- 全部签到状态 -->
            <div class="card">
                <h2>全部签到状态</h2>
                <div id="admin-status-list">
                    <div class="empty">加载中...</div>
                </div>
            </div>

            <!-- 用户定时管理 -->
            <div class="card">
                <h2>用户定时管理</h2>
                <div class="schedule-actions" style="margin-bottom: 12px;">
                    <input type="time" id="batch-sched-time" value="06:00">
                    <button class="btn-warning" onclick="batchUpdateSchedules()">一键统一时间</button>
                </div>
                <div id="admin-schedule-list">
                    <div class="empty">加载中...</div>
                </div>
                <div id="admin-schedule-msg" class="msg"></div>
            </div>

            <!-- 用户推送管理 -->
            <div class="card">
                <h2>用户推送管理</h2>
                <div id="admin-notify-list">
                    <div class="empty">加载中...</div>
                </div>
                <div id="admin-notify-msg" class="msg"></div>
            </div>

            <!-- 执行全部签到 -->
            <div class="card">
                <h2>执行全部签到</h2>
                <div class="form-row">
                    <button class="btn-success" onclick="doAdminSign()" id="btn-admin-sign">执行全部签到</button>
                </div>
                <div id="admin-sign-log" class="sign-log"></div>
            </div>
        </div>

        <!-- 更新 -->
        <div class="card">
            <h2>程序更新</h2>
            <div class="schedule-status">
                <span class="status-dot off" id="update-dot"></span>
                <div>
                    <div class="status-text" id="update-status-text">点击按钮检查更新</div>
                    <div class="status-detail" id="update-status-detail">从 GitHub 拉取最新代码并重启服务</div>
                </div>
            </div>
            <div class="schedule-actions">
                <button class="btn-primary" onclick="doUpdate()" id="btn-update">检查更新</button>
            </div>
            <div id="update-msg" class="msg"></div>
        </div>
    </div>

    <script>
        // ===== 全局状态 =====
        var token = localStorage.getItem('token');
        var currentUser = null;
        var isRegisterMode = false;

        // ===== 工具函数 =====
        function showMsg(id, text, ok) {
            var el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + (ok ? 'ok' : 'err');
            setTimeout(function() { el.className = 'msg'; }, 5000);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function apiFetch(url, options) {
            options = options || {};
            options.headers = options.headers || {};
            if (token) {
                options.headers['Authorization'] = 'Bearer ' + token;
            }
            if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(options.body);
            }
            return fetch(url, options).then(function(r) {
                if (r.status === 401) {
                    doLogout();
                    throw new Error('登录已过期，请重新登录');
                }
                // SSE 响应不解析 JSON
                if (options.stream) {
                    return r;
                }
                return r.json();
            });
        }

        // ===== 认证 =====
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').textContent = isRegisterMode ? '注册' : '登录';
            document.getElementById('btn-auth').textContent = isRegisterMode ? '注册' : '登录';
            document.getElementById('btn-toggle-auth').textContent = isRegisterMode ? '已有账号？登录' : '没有账号？注册';
        }

        function doAuth() {
            var username = document.getElementById('auth-username').value.trim();
            var password = document.getElementById('auth-password').value;

            if (!username || !password) {
                showMsg('auth-msg', '请输入用户名和密码', false);
                return;
            }

            var endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
            var btn = document.getElementById('btn-auth');
            btn.disabled = true;
            btn.textContent = isRegisterMode ? '注册中...' : '登录中...';

            fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password}),
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    currentUser = {
                        id: data.user ? data.user.id : null,
                        username: data.username,
                        is_admin: data.is_admin || false,
                    };
                    showMainUI();
                } else {
                    showMsg('auth-msg', data.msg, false);
                }
            }).catch(function(e) {
                showMsg('auth-msg', '请求失败: ' + e.message, false);
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = isRegisterMode ? '注册' : '登录';
            });
        }

        function doLogout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            document.getElementById('auth-section').style.display = '';
            document.getElementById('main-section').style.display = 'none';
        }

        function checkAuth() {
            if (!token) {
                document.getElementById('auth-section').style.display = '';
                document.getElementById('main-section').style.display = 'none';
                return;
            }

            apiFetch('/api/auth/me').then(function(data) {
                if (data.ok) {
                    currentUser = data.user;
                    showMainUI();
                } else {
                    doLogout();
                }
            }).catch(function() {
                doLogout();
            });
        }

        function showMainUI() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-section').style.display = '';

            // 更新用户信息
            document.getElementById('display-username').textContent = currentUser.username;
            document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase();

            if (currentUser.is_admin) {
                document.getElementById('admin-badge').style.display = '';
                document.getElementById('display-role').textContent = '管理员';
                document.getElementById('admin-tabs').style.display = '';
            } else {
                document.getElementById('admin-badge').style.display = 'none';
                document.getElementById('display-role').textContent = '普通用户';
                document.getElementById('admin-tabs').style.display = 'none';
                document.getElementById('user-content').className = 'tab-content active';
                document.getElementById('admin-content').className = 'tab-content';
            }

            // 加载数据
            loadMyAccounts();
            loadMyStatus();
            loadMyNotify();
            loadMySchedule();

            if (currentUser.is_admin) {
                loadAdminUsers();
                loadAdminAccounts();
                loadAdminStatus();
                loadAdminSchedules();
                loadAdminNotify();
            }
        }

        // ===== 标签页切换 =====
        function switchTab(tab) {
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(t) { t.className = 'tab'; });

            if (tab === 'user') {
                tabs[0].className = 'tab active';
                document.getElementById('user-content').className = 'tab-content active';
                document.getElementById('admin-content').className = 'tab-content';
            } else {
                tabs[1].className = 'tab active';
                document.getElementById('user-content').className = 'tab-content';
                document.getElementById('admin-content').className = 'tab-content active';
            }
        }

        // ===== Geetest v4 验证码 =====
        var GEETEST_SCRIPT_URL = 'https://static.geetest.com/v4/gt4.js';
        var KURO_CAPTCHA_ID = 'ec4aa4174277d822d73f2442a165a2cd';

        var geetestReady = false;
        var showKuroCaptcha = null;
        var captchaInitToken = 0;

        function loadGeetestScript(useCacheBust) {
            return new Promise(function(resolve, reject) {
                if (typeof window.initGeetest4 === 'function') { resolve(); return; }
                document.querySelectorAll('script[data-gt4-loader]').forEach(function(s) { s.remove(); });
                var script = document.createElement('script');
                script.src = GEETEST_SCRIPT_URL + (useCacheBust ? '?retry=' + Date.now() : '');

                script.dataset.gt4Loader = 'true';
                script.onload = function() {
                    typeof window.initGeetest4 === 'function' ? resolve() : reject(new Error('initGeetest4 unavailable'));
                };
                script.onerror = function() { script.remove(); reject(new Error('gt4 load failed')); };

                });

        function initKuroCaptcha(phone, msgId, callback) {
            var token = ++captchaInitToken;
            geetestReady = false;
            showKuroCaptcha = null;

            loadGeetestWithRetry().then(function() {
                if (token !== captchaInitToken) return;
                window.initGeetest4({
                    captchaId: KURO_CAPTCHA_ID,
                    product: "bind",
                }, function(captcha) {
                    if (token !== captchaInitToken) return;
                    captcha.onReady(function() {
                        geetestReady = true;
                        showKuroCaptcha = function() { captcha.showBox(); };
                        showKuroCaptcha();
                    }).onSuccess(function() {
                        var result = captcha.getValidate();
                        if (!result) { showMsg(msgId, '请完成验证', false); return; }
                        result.captcha_id = KURO_CAPTCHA_ID;
                        callback(result);
                    }).onError(function() {
                        showMsg(msgId, '验证出错，请重试', false);
                    });
                });
            }).catch(function() {
                showMsg(msgId, '加载验证组件失败，请检查网络', false);

            var logEl = document.getElementById('my-sign-log');
            btn.disabled = true;
            btn.textContent = '签到中...';
            logEl.innerHTML = '';
            logEl.classList.add('show');

            apiFetch('/api/my/sign', {method: 'POST', stream: true}).then(function(resp) {
                var reader = resp.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '';

                function read() {
                    return reader.read().then(function(result) {
                        if (result.done) return;
                        buffer += decoder.decode(result.value, {stream: true});
                        var lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i];
                            if (line.indexOf('data: ') === 0) {
                                try {
                                    var data = JSON.parse(line.slice(6));
                                    var cls = data.type === 'error' ? 'log-error' :
                                               data.type === 'skip' ? 'log-skip' :
                                               data.type === 'progress' ? 'log-progress' :
                                               data.type === 'done' ? 'log-done' : '';
                                    logEl.innerHTML += '<div class="' + cls + '">' + escapeHtml(data.msg) + '</div>';
                                    logEl.scrollTop = logEl.scrollHeight;
                                    if (data.done) { loadMyStatus(); }
                                } catch(e) {}
                            }
                        }
                        return read();
                    });
                }
                return read();
            }).catch(function(e) {
                logEl.innerHTML += '<div class="log-error">请求失败: ' + escapeHtml(e.message) + '</div>';
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = '开始签到';

        }

        }

        function updateSingleSchedule(userId) {
            var timeInput = document.getElementById('sched-time-' + userId);
            if (!timeInput) return;
            var time = timeInput.value;

            // 先获取当前启用状态
            apiFetch('/api/admin/schedules').then(function(data) {
                var user = data.find(function(s) { return s.user_id === userId; });
                var enabled = user ? user.enabled : false;
                return apiFetch('/api/admin/schedules/' + userId, {
                    method: 'PUT',
                    body: {enabled: enabled, time: time},
                });
            }).then(function(data) {
                showMsg('admin-schedule-msg', data.msg, data.ok);
            }).catch(function(e) {
                showMsg('admin-schedule-msg', '保存失败: ' + e.message, false);
            });
        }

        function toggleUserSchedule(userId, newEnabled) {
            var timeInput = document.getElementById('sched-time-' + userId);
            var time = timeInput ? timeInput.value : '06:00';

            apiFetch('/api/admin/schedules/' + userId, {
                method: 'PUT',
                body: {enabled: newEnabled, time: time},
            }).then(function(data) {
                showMsg('admin-schedule-msg', data.msg, data.ok);
                if (data.ok) loadAdminSchedules();
            }).catch(function(e) {
                showMsg('admin-schedule-msg', '操作失败: ' + e.message, false);
            });
        }

        function batchUpdateSchedules() {
            var time = document.getElementById('batch-sched-time').value;
            if (!time) { showMsg('admin-schedule-msg', '请选择时间', false); return; }

            if (!confirm('确定将所有用户的定时签到时间设为 ' + time + ' 并启用？')) return;

            apiFetch('/api/admin/schedules/batch', {
                method: 'POST',
                body: {enabled: true, time: time},
            }).then(function(data) {
                showMsg('admin-schedule-msg', data.msg, data.ok);
                if (data.ok) loadAdminSchedules();
            }).catch(function(e) {
                showMsg('admin-schedule-msg', '操作失败: ' + e.message, false);
            });
        }

        // ===== 管理员：用户推送管理 =====
        function loadAdminNotify() {
            apiFetch('/api/admin/users').then(function(users) {
                var el = document.getElementById('admin-notify-list');
                if (users.length === 0) {
                    el.innerHTML = '<div class="empty">暂无用户</div>';
                    return;
                }

                var html = '<table class="user-table"><thead><tr><th>用户名</th><th>推送状态</th><th>操作</th></tr></thead><tbody>';
                users.forEach(function(user) {
                    html += '<tr>' +
                        '<td>' + escapeHtml(user.username) + '</td>' +
                        '<td id="notify-status-' + user.id + '">加载中...</td>' +
                        '<td>' +
                            '<button class="btn-sm btn-outline" onclick="showNotifyEdit(' + user.id + ', \'' + escapeHtml(user.username) + '\')">编辑</button>' +
                        '</td>' +
                    '</tr>';
                });
                html += '</tbody></table>';
                el.innerHTML = html;

                // 加载每个用户的推送状态
                users.forEach(function(user) {
                    apiFetch('/api/admin/users/' + user.id + '/notify').then(function(data) {
                        var statusEl = document.getElementById('notify-status-' + user.id);
                        if (statusEl) {
                            var services = [];
                            if (data.serverchan_sckey) services.push('Server酱');
                            if (data.telegram_bot_token) services.push('Telegram');
                            statusEl.innerHTML = data.enabled ?
                                '<span style="color:#52c41a">已启用</span>' + (services.length ? ' (' + services.join('+') + ')' : '') :
                                '<span style="color:#999">未启用</span>';
                        }
                    });
                });
            }).catch(function() {
                document.getElementById('admin-notify-list').innerHTML = '<div class="empty">加载失败</div>';
            });
        }

        function showNotifyEdit(userId, username) {
            apiFetch('/api/admin/users/' + userId + '/notify').then(function(data) {
                var sckey = data.serverchan_sckey || '';
                var tgToken = data.telegram_bot_token || '';
                var tgChat = data.telegram_chat_id || '';

                var msg = '编辑「' + username + '」的推送配置\n\n' +
                    '当前状态: ' + (data.enabled ? '已启用' : '未启用') + '\n' +
                    'Server酱 SCKEY: ' + (sckey ? sckey.substring(0, 8) + '...' : '(空)') + '\n' +
                    'Telegram Token: ' + (tgToken ? tgToken.substring(0, 8) + '...' : '(空)') + '\n' +
                    'Telegram Chat ID: ' + (tgChat || '(空)');

                alert(msg);
            });
        }

        // ===== 更新 =====
        function doUpdate() {
            var btn = document.getElementById('btn-update');
            var dot = document.getElementById('update-dot');
            var textEl = document.getElementById('update-status-text');
            var detailEl = document.getElementById('update-status-detail');

            btn.disabled = true;
            btn.textContent = '更新中...';
            dot.className = 'status-dot';
            textEl.textContent = '正在从 GitHub 拉取更新...';
            detailEl.textContent = '请稍候，完成后服务会自动重启';

            apiFetch('/api/update', {method: 'POST'}).then(function(data) {
                showMsg('update-msg', data.msg, data.ok);
                if (data.ok) {
                    dot.className = 'status-dot on';
                    textEl.textContent = '更新完成';
                    detailEl.textContent = data.msg.split('\n')[0];
                    setTimeout(function() { location.reload(); }, 8000);
                } else {
                    dot.className = 'status-dot off';
                    textEl.textContent = '更新失败';
                    detailEl.textContent = data.msg;
                }
                btn.disabled = false;
                btn.textContent = '检查更新';
            }).catch(function(e) {
                showMsg('update-msg', '更新失败: ' + e.message, false);
                dot.className = 'status-dot off';
                textEl.textContent = '更新失败';
                detailEl.textContent = e.message;
                btn.disabled = false;
                btn.textContent = '检查更新';
            });
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            onAddPlatformChange();
            checkAuth();
        });
    </script>
</body>
</html>
