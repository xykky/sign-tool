<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>签到工具</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface2: #fafafa;
            --border: rgba(0,0,0,0.06);
            --text: #1d1d1f;
            --text2: #6e6e73;
            --text3: #aeaeb2;
            --blue: #007aff;
            --blue-bg: #ebf5ff;
            --green: #34c759;
            --green-bg: #e9f8ed;
            --red: #ff3b30;
            --red-bg: #fff0ef;
            --orange: #ff9500;
            --orange-bg: #fff5ea;
            --purple: #af52de;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 20px 0 8px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow .2s;
        }
        .card:hover { box-shadow: var(--shadow); }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .card-header h2 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
        }
        .card-header .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: .3px;
        }
        .badge-blue { background: var(--blue-bg); color: var(--blue); }
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-red { background: var(--red-bg); color: var(--red); }

        /* ── Form ── */
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 6px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 0;
        }

        input, select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: var(--font);
            background: var(--surface2);
            color: var(--text);
            outline: none;
            transition: all .2s;
            -webkit-appearance: none;
        }
        input:focus, select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,122,255,.12);
            background: var(--surface);
        }
        input[type="time"] { width: 100px; }
        input[type="text"], input[type="tel"], input[type="password"] { flex:1; min-width:120px; }

        /* ── Buttons ── */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all .15s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(.97); }
        button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #0066d6; }

        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover:not(:disabled) { background: #2db44d; }

        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #e0302c; }

        .btn-warning { background: var(--orange); color: #fff; }
        .btn-warning:hover:not(:disabled) { background: #e08600; }

        .btn-ghost {
            background: transparent;
            color: var(--blue);
            padding: 8px 16px;
        }
        .btn-ghost:hover:not(:disabled) { background: var(--blue-bg); }

        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 14px; }
        .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 12px; }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text2);
        }
        .btn-outline:hover:not(:disabled) {
            border-color: var(--blue);
            color: var(--blue);
            background: var(--blue-bg);
        }

        /* ── Message ── */
        .msg {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: fadeIn .2s;
        }
        .msg.show { display: block; }
        .msg-ok { background: var(--green-bg); color: var(--green); }
        .msg-err { background: var(--red-bg); color: var(--red); }

        @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

        /* ── User Bar ── */
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            margin-bottom: 16px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .user-name { font-weight: 600; font-size: 15px; }
        .user-role { font-size: 12px; color: var(--text2); }
        .role-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--orange), #ff6b00);
            color: #fff;
            margin-left: 6px;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 16px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text2);
            transition: all .2s;
            border: none;
            background: transparent;
        }
        .tab:hover { color: var(--text); background: var(--surface2); }
        .tab.active { background: var(--blue); color: #fff; font-weight: 600; }
        .tab-content { display: none; animation: fadeIn .3s; }
        .tab-content.active { display: block; }

        /* ── Account List ── */
        .account-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .account-item:last-child { border-bottom: none; }
        .platform-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
        }
        .tag-kuro { background: var(--blue-bg); color: var(--blue); }
        .tag-tajiduo { background: var(--orange-bg); color: var(--orange); }
        .account-uid { font-weight: 600; font-size: 14px; }
        .account-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }

        /* ── Status ── */
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-card {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border: 1px solid var(--border);
        }
        .status-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
        }
        .status-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 6px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text2);
            padding: 4px 0;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-ok { background: var(--green); }
        .dot-miss { background: var(--text3); }

        .empty-state {
            text-align: center;
            color: var(--text3);
            padding: 32px 20px;
            font-size: 14px;
        }

        /* ── Sign Log ── */
        .sign-log {
            background: #1a1a2e;
            color: #a0ffa0;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 12px;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            max-height: 320px;
            overflow-y: auto;
            display: none;
            margin-top: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .sign-log.show { display: block; }
        .sign-log .e { color: #ff6b6b; }
        .sign-log .s { color: #888; }
        .sign-log .p { color: #7ec8ff; }
        .sign-log .d { color: #6bff9e; }

        /* ── Schedule ── */
        .schedule-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .sched-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sched-on { background: var(--green); box-shadow: 0 0 6px rgba(52,199,89,.4); }
        .sched-off { background: var(--text3); }
        .sched-text { font-size: 14px; font-weight: 500; }
        .sched-detail { font-size: 12px; color: var(--text2); }

        /* ── Table ── */
        .tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .tbl th, .tbl td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .tbl th {
            font-weight: 600;
            color: var(--text2);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .tbl tbody tr:hover { background: var(--surface2); }

        /* ── Utility ── */
        .flex-between { display:flex; justify-content:space-between; align-items:center; }
        .gap-8 { gap:8px; }
        .mt-8 { margin-top:8px; }
        .text-sm { font-size:13px; }
        .text-muted { color: var(--text2); }

        /* ── Toggle Switch ── */
        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
        }
        .toggle-track {
            width: 44px; height: 26px;
            border-radius: 13px;
            background: #e5e5ea;
            position: relative;
            transition: background .2s;
        }
        .toggle-track.on { background: var(--green); }
        .toggle-track::after {
            content: '';
            width: 22px; height: 22px;
            border-radius: 50%;
            background: #fff;
            position: absolute;
            top: 2px; left: 2px;
            transition: transform .2s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .toggle-track.on::after { transform: translateX(18px); }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .container { padding: 12px 10px 80px; }
            .card { padding: 16px; }
            .header h1 { font-size: 22px; }
            .status-items { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>签到工具</h1></div>

    <!-- Auth -->
    <div id="auth-section">
        <div class="card">
            <h2 id="auth-title" style="margin-bottom:16px">登录</h2>
            <div class="form-group"><label>用户名</label><input type="text" id="auth-username" placeholder="请输入用户名" autocomplete="username"></div>
            <div class="form-group"><label>密码</label><input type="password" id="auth-password" placeholder="请输入密码" autocomplete="current-password"></div>
            <div class="form-row">
                <button class="btn-primary" onclick="doAuth()" id="btn-auth">登录</button>
                <button class="btn-ghost" onclick="toggleAuthMode()" id="btn-toggle-auth">没有账号？注册</button>
            </div>
            <div id="auth-msg" class="msg"></div>
        </div>
    </div>

    <!-- Main -->
    <div id="main-section" style="display:none">
        <div class="user-bar">
            <div class="user-info">
                <div class="avatar" id="user-avatar">U</div>
                <div>
                    <div class="user-name"><span id="display-username">用户</span><span id="admin-badge" class="role-badge" style="display:none">ADMIN</span></div>
                    <div class="user-role" id="display-role">普通用户</div>
                </div>
            </div>
            <button class="btn-ghost btn-sm" onclick="doLogout()">退出</button>
        </div>

        <div id="admin-tabs" class="tabs" style="display:none">
            <button class="tab active" onclick="switchTab('user')">我的</button>
            <button class="tab" onclick="switchTab('admin')">管理</button>
        </div>

        <!-- User content -->
        <div id="user-content" class="tab-content active">
            <div class="card">
                <div class="card-header"><h2>添加账号</h2></div>
                <div class="form-row">
                    <select id="add-platform" onchange="onAddPlatformChange()">
                        <option value="kuro">库洛 (鸣潮/战双)</option>
                        <option value="tajiduo">塔吉多 (异环/幻塔)</option>
                    </select>
                    <select id="add-game">
                        <option value="waves">鸣潮</option>
                        <option value="pgr">战双</option>
                    </select>
                </div>
                <div class="form-row" style="margin-top:8px">
                    <input id="add-phone" type="tel" placeholder="手机号" maxlength="11">
                    <input id="add-code" type="text" placeholder="验证码" maxlength="6">
                </div>
                <div class="form-row" style="margin-top:8px">
                    <button class="btn-outline btn-sm" onclick="sendAddCode()" id="btn-send-add-code">发送验证码</button>
                    <button class="btn-primary" onclick="doAddLogin()" id="btn-add-login">登录并添加</button>
                </div>
                <div id="add-msg" class="msg"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>我的账号</h2></div>
                <div id="my-account-list"><div class="empty-state">加载中...</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>今日签到状态</h2><span class="badge badge-blue" id="status-date"></span></div>
                <div id="my-status-list"><div class="empty-state">加载中...</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>执行签到</h2></div>
                <button class="btn-success" onclick="doMySign()" id="btn-my-sign" style="width:100%">开始签到</button>
                <div id="my-sign-log" class="sign-log"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>推送通知</h2></div>
                <div id="my-notify-section"><div class="empty-state">加载中...</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>定时签到</h2></div>
                <div id="my-schedule-section"><div class="empty-state">加载中...</div></div>
            </div>
        </div>

        <!-- Admin content -->
        <div id="admin-content" class="tab-content">
            <div class="card">
                <div class="card-header"><h2>用户管理</h2></div>
                <div id="admin-user-list"><div class="empty-state">加载中...</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>全部账号</h2></div>
                <div id="admin-account-list"><div class="empty-state">加载中...</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>全部签到状态</h2></div>
                <div id="admin-status-list"><div class="empty-state">加载中...</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>用户定时管理</h2></div>
                <div class="form-row" style="margin-bottom:12px">
                    <input type="time" id="batch-sched-time" value="06:00">
                    <button class="btn-warning btn-sm" onclick="batchUpdateSchedules()">一键统一</button>
                    <button class="btn-success btn-sm" onclick="batchEnableSchedules()">全部开启</button>
                    <button class="btn-danger btn-sm" onclick="batchDisableSchedules()">全部关闭</button>
                </div>
                <div id="admin-schedule-list"><div class="empty-state">加载中...</div></div>
                <div id="admin-schedule-msg" class="msg"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>用户推送管理</h2></div>
                <div id="admin-notify-list"><div class="empty-state">加载中...</div></div>
                <div id="admin-notify-msg" class="msg"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>执行全部签到</h2></div>
                <button class="btn-success" onclick="doAdminSign()" id="btn-admin-sign" style="width:100%">执行全部签到</button>
                <div id="admin-sign-log" class="sign-log"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>程序更新</h2></div>
                <div class="schedule-status">
                    <div class="sched-dot sched-off" id="update-dot"></div>
                    <div>
                        <div class="sched-text" id="update-status-text">点击按钮检查更新</div>
                        <div class="sched-detail" id="update-status-detail">从 GitHub 拉取最新代码并重启服务</div>
                    </div>
                </div>
                <button class="btn-primary" onclick="doUpdate()" id="btn-update" style="width:100%">检查更新</button>
                <div id="update-msg" class="msg"></div>
            </div>
        </div>
    </div>
</div>

<script>
var token = localStorage.getItem('token');
var currentUser = null;
var isRegisterMode = false;

// ── Helpers ──
function $(id) { return document.getElementById(id); }
function escapeHtml(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
function showMsg(id, text, ok) {
    var el = $(id);
    el.textContent = text;
    el.className = 'msg show ' + (ok ? 'msg-ok' : 'msg-err');
    setTimeout(function() { el.className = 'msg'; }, 5000);
}

function apiFetch(url, options) {
    options = options || {};
    options.headers = options.headers || {};
    if (token) options.headers['Authorization'] = 'Bearer ' + token;
    if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(options.body);
    }
    return fetch(url, options).then(function(r) {
        if (r.status === 401) { doLogout(); throw new Error('登录已过期'); }
        if (options.stream) return r;
        return r.json();
    });
}

// ── Auth ──
function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    $('auth-title').textContent = isRegisterMode ? '注册' : '登录';
    $('btn-auth').textContent = isRegisterMode ? '注册' : '登录';
    $('btn-toggle-auth').textContent = isRegisterMode ? '已有账号？登录' : '没有账号？注册';
}

function doAuth() {
    var username = $('auth-username').value.trim();
    var password = $('auth-password').value;
    if (!username || !password) { showMsg('auth-msg', '请输入用户名和密码', false); return; }

    var ep = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
    var btn = $('btn-auth');
    btn.disabled = true;
    btn.textContent = isRegisterMode ? '注册中...' : '登录中...';

    fetch(ep, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: username, password: password}),
    }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) {
            token = data.token;
            localStorage.setItem('token', token);
            currentUser = { id: data.user ? data.user.id : null, username: data.username, is_admin: data.is_admin || false };
            showMainUI();
        } else { showMsg('auth-msg', data.msg, false); }
    }).catch(function(e) { showMsg('auth-msg', '请求失败: ' + e.message, false); })
    .finally(function() { btn.disabled = false; btn.textContent = isRegisterMode ? '注册' : '登录'; });
}

function doLogout() {
    token = null; currentUser = null;
    localStorage.removeItem('token');
    $('auth-section').style.display = '';
    $('main-section').style.display = 'none';
}

function checkAuth() {
    if (!token) { $('auth-section').style.display = ''; $('main-section').style.display = 'none'; return; }
    apiFetch('/api/auth/me').then(function(data) {
        if (data.ok) { currentUser = data.user; showMainUI(); }
        else { doLogout(); }
    }).catch(function() { doLogout(); });
}

function showMainUI() {
    $('auth-section').style.display = 'none';
    $('main-section').style.display = '';
    $('display-username').textContent = currentUser.username;

var GEETEST_SCRIPT_URL = 'https://static.geetest.com/v4/gt4.js';
var KURO_CAPTCHA_ID = 'ec4aa4174277d822d73f2442a165a2cd';
var geetestReady = false;
var showKuroCaptcha = null;
var captchaInitToken = 0;

function loadGeetestScript(retry) {
    return new Promise(function(resolve, reject) {
        if (typeof window.initGeetest4 === 'function') { resolve(); return; }
        document.querySelectorAll('script[data-gt4-loader]').forEach(function(s) { s.remove(); });
        var s = document.createElement('script');
        s.src = retry ? GEETEST_SCRIPT_URL + '?retry=' + Date.now() : GEETEST_SCRIPT_URL;
        s.async = true;
        s.dataset.gt4Loader = 'true';
        s.onload = function() { typeof window.initGeetest4 === 'function' ? resolve() : reject(new Error('initGeetest4 unavailable')); };
        s.onerror = function() { s.remove(); reject(new Error('gt4 load failed')); };
        document.head.appendChild(s);
    });
}
function loadGeetestWithRetry() {
    return loadGeetestScript(false).catch(function() {
        return new Promise(function(resolve, reject) {
            setTimeout(function() { loadGeetestScript(true).then(resolve).catch(reject); }, 2000);
        });
    });
}
function initKuroCaptcha(phone, msgId, cb) {
    var token = ++captchaInitToken;
    geetestReady = false; showKuroCaptcha = null;
    loadGeetestWithRetry().then(function() {
        if (token !== captchaInitToken) return;
        window.initGeetest4({
            product: 'bind',
            captchaId: KURO_CAPTCHA_ID,
            riskType: 'slide',
            language: 'zho',
            onReady: function(c) {
                if (token !== captchaInitToken) return;
                showKuroCaptcha = function() { c.showCaptcha(); };
                geetestReady = true;
                cb();
            },
            onSuccess: function(e) {
                showKuroCaptcha = null;
                sendKuroSms(phone, msgId, {geetest_challenge: e.captcha_output, geetest_validate: e.gen_time, geetest_seccode: e.lot_number});
            },
            onError: function(err) {
                showKuroCaptcha = null;
                showMsg('add-msg', '验证码加载失败: ' + (err.msg || err.errMsg || '请重试'), false);
            },
        });
    }).catch(function(err) {
        showMsg('add-msg', '验证码SDK加载失败: ' + err.message, false);
    });
}

var kuroSmsToken = '';
var kuroLoginToken = '';
function sendKuroSms(phone, msgId, captcha) {
    apiFetch('/api/add/kuro/login', {
        method: 'POST',
        body: {phone: phone, step: 'sms', msg_id: msgId, captcha: captcha},
    }).then(function(data) {
        if (data.ok) {
            kuroLoginToken = data.login_token || '';
            showMsg('add-msg', '验证码已发送', true);
        } else {
            if (data.need_captcha) { kuroSmsToken = data.sms_token || ''; initKuroCaptcha(phone, data.msg_id, function() { if (showKuroCaptcha) showKuroCaptcha(); }); }
            showMsg('add-msg', data.msg || '发送失败', data.ok);
        }
    }).catch(function(e) { showMsg('add-msg', '请求失败: ' + e.message, false); });

// ── My Sign ──
function doMySign() {
    var btn = $('btn-my-sign');
    var logEl = $('my-sign-log');
    btn.disabled = true; btn.textContent = '签到中...';
    logEl.innerHTML = ''; logEl.classList.add('show');

    apiFetch('/api/my/sign', {method: 'POST', stream: true}).then(function(resp) {
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        function read() {
            return reader.read().then(function(result) {
                if (result.done) return;
                buffer += decoder.decode(result.value, {stream: true});
                var lines = buffer.split('\n');
                buffer = lines.pop() || '';
                lines.forEach(function(line) {
                    if (line.indexOf('data: ') !== 0) return;
                    try {
                        var d = JSON.parse(line.slice(6));
                        var cls = d.type === 'error' ? 'e' : d.type === 'skip' ? 's' : d.type === 'progress' ? 'p' : d.type === 'done' ? 'd' : '';
                        logEl.innerHTML += '<div class="' + cls + '">' + escapeHtml(d.msg) + '</div>';
                        logEl.scrollTop = logEl.scrollHeight;
                        if (d.done) loadMyStatus();
                    } catch(e) {}
                });
                return read();
            });
        }
        return read();
    }).catch(function(e) { logEl.innerHTML += '<div class="e">请求失败: ' + escapeHtml(e.message) + '</div>'; })
    .finally(function() { btn.disabled = false; btn.textContent = '开始签到'; });
}

    var timeEl = $('sched-time-' + uid);
    var time = timeEl ? timeEl.value : '06:00';
    apiFetch('/api/admin/schedules/' + uid, {method: 'PUT', body: {enabled: on, time: time}}).then(function(data) {
        showMsg('admin-schedule-msg', data.msg, data.ok);
        if (data.ok) loadAdminSchedules();
    }).catch(function(e) { showMsg('admin-schedule-msg', '操作失败: ' + e.message, false); });
}

function batchUpdateSchedules() {
    var t = $('batch-sched-time').value;
    if (!t) { showMsg('admin-schedule-msg', '请选择时间', false); return; }
    if (!confirm('确定将所有用户定时设为 ' + t + ' 并启用？')) return;
    apiFetch('/api/admin/schedules/batch', {method: 'POST', body: {enabled: true, time: t}}).then(function(data) {
        showMsg('admin-schedule-msg', data.msg, data.ok);
        if (data.ok) loadAdminSchedules();
    }).catch(function(e) { showMsg('admin-schedule-msg', '操作失败: ' + e.message, false); });
}

function batchEnableSchedules() {
    var t = $('batch-sched-time').value;
    if (!t) { showMsg('admin-schedule-msg', '请选择时间', false); return; }
    if (!confirm('确定开启所有用户定时？时间: ' + t)) return;
    apiFetch('/api/admin/schedules/batch', {method: 'POST', body: {enabled: true, time: t}}).then(function(data) {
        showMsg('admin-schedule-msg', data.msg, data.ok);
        if (data.ok) loadAdminSchedules();
    }).catch(function(e) { showMsg('admin-schedule-msg', '操作失败: ' + e.message, false); });
}

function batchDisableSchedules() {
    if (!confirm('确定关闭所有用户定时？')) return;
    apiFetch('/api/admin/schedules/batch', {method: 'POST', body: {enabled: false, time: '06:00'}}).then(function(data) {
        showMsg('admin-schedule-msg', data.msg, data.ok);
        if (data.ok) loadAdminSchedules();
    }).catch(function(e) { showMsg('admin-schedule-msg', '操作失败: ' + e.message, false); });
}

// ── Admin: Notify ──
function loadAdminNotify() {
    apiFetch('/api/admin/users').then(function(users) {
        var el = $('admin-notify-list');
        if (!users.length) { el.innerHTML = '<div class="empty-state">暂无用户</div>'; return; }
        var h = '<table class="tbl"><thead><tr><th>用户名</th><th>推送</th><th>操作</th></tr></thead><tbody>';
        users.forEach(function(u) {
            h += '<tr><td>' + escapeHtml(u.username) + '</td><td id="notify-status-' + u.id + '" class="text-muted text-sm">加载中...</td>' +
                '<td><button class="btn-outline btn-xs" onclick="showNotifyEdit(' + u.id + ', \'' + escapeHtml(u.username) + '\')">编辑</button></td></tr>';
        });
        h += '</tbody></table>';
        el.innerHTML = h;
        users.forEach(function(u) {
            apiFetch('/api/admin/users/' + u.id + '/notify').then(function(d) {
                var sEl = $('notify-status-' + u.id);
                if (!sEl) return;
                var svc = [];
                if (d.serverchan_sckey) svc.push('Server酱');
                if (d.telegram_bot_token) svc.push('Telegram');
                sEl.innerHTML = d.enabled ? '<span style="color:#34c759;font-weight:500">已启用</span>' + (svc.length ? ' (' + svc.join('+') + ')' : '') : '<span style="color:#aeaeb2">未启用</span>';
            });
        });
    }).catch(function() { $('admin-notify-list').innerHTML = '<div class="empty-state">加载失败</div>'; });
}

function showNotifyEdit(uid, name) {
    apiFetch('/api/admin/users/' + uid + '/notify').then(function(d) {
        var sckey = d.serverchan_sckey || ''; var tg = d.telegram_bot_token || ''; var chat = d.telegram_chat_id || '';
        alert('编辑「' + name + '」的推送配置\n\n状态: ' + (d.enabled ? '已启用' : '未启用') +
            '\nServer酱: ' + (sckey ? sckey.substring(0, 8) + '...' : '(空)') +
            '\nTelegram: ' + (tg ? tg.substring(0, 8) + '...' : '(空)') + ' / Chat: ' + (chat || '(空)'));
    });
}

// ── Update ──
function doUpdate() {
    var btn = $('btn-update');
    var dot = $('update-dot');
    var text = $('update-status-text');
    var detail = $('update-status-detail');
    btn.disabled = true; btn.textContent = '更新中...';
    dot.className = 'sched-dot'; text.textContent = '正在拉取更新...';
    detail.textContent = '完成后服务会自动重启';

    apiFetch('/api/update', {method: 'POST'}).then(function(d) {
        showMsg('update-msg', d.msg, d.ok);
        if (d.ok) {
            dot.className = 'sched-dot sched-on'; text.textContent = '更新完成';
            detail.textContent = (d.msg || '').split('\n')[0];
            setTimeout(function() { location.reload(); }, 8000);
        } else {
            dot.className = 'sched-dot sched-off'; text.textContent = '更新失败'; detail.textContent = d.msg;
        }
        btn.disabled = false; btn.textContent = '检查更新';
    }).catch(function(e) {
        showMsg('update-msg', '更新失败: ' + e.message, false);
        dot.className = 'sched-dot sched-off'; text.textContent = '更新失败'; detail.textContent = e.message;
        btn.disabled = false; btn.textContent = '检查更新';
    });
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
    onAddPlatformChange();
    checkAuth();
});
</script>
